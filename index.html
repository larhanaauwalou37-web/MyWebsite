<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website na Auwal</title>
<style>
body { font-family:'Arial'; margin:0; padding:0; background:#111; color:#fff;}
header { background:#222; padding:20px; text-align:center; }
header h1 { margin:0; color:#ffcc00; text-shadow:2px2px5px #000; }
nav { background:#333; padding:10px; text-align:center; }
nav a { color:#fff; margin:0 10px; text-decoration:none; font-weight:bold; }
nav a:hover { color:#ffcc00; }

.featured { display:flex; overflow-x:auto; gap:15px; padding:20px; }
.featured::-webkit-scrollbar { display:none; }
.featured video { height:250px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.7); }

.container { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px; }
.video-card { background:#222; border-radius:10px; width:300px; overflow:hidden; transition:0.3s; box-shadow:0 5px 15px rgba(0,0,0,0.5); }
.video-card:hover { transform:scale(1.05); box-shadow:0 10px 20px rgba(0,0,0,0.7); }
.video-card img { width:100%; }
.video-card h3 { margin:10px; color:#ffcc00; }
.video-card p { margin:0 10px 10px 10px; font-size:0.9em; color:#ccc; }

footer { background:#222; text-align:center; padding:20px; margin-top:20px; font-size:0.9em; color:#aaa; }
@media(max-width:768px){ .video-card, .featured video{ width:90%; height:auto;} nav{flex-direction:column;} }
</style>
</head>
<body>

<header>
<h1>Website na Auwal</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Series</a>
<a href="contact.html">Contact</a>
</nav>

<!-- Featured Videos -->
<div class="featured" id="featured"></div>

<!-- Trending / Video Grid -->
<div class="container" id="trending"></div>

<footer>
<p>© 2026 Website na Auwal | Contact: <a href="mailto:larhanaauwalou37@gmail.com">Email</a> | WhatsApp: <a href="https://wa.me/YOUR_NUMBER" target="_blank">Chat</a></p>
</footer>

<script>
// Auto load videos from JSON
fetch('videos.json')
.then(res => res.json())
.then(data => {
  const featured = document.getElementById('featured');
  const trending = document.getElementById('trending');

  data.forEach(video => {
    // Featured
    const vid = document.createElement('video');
    vid.src = video.file;
    vid.controls = true;
    featured.appendChild(vid);

    // Trending / grid
    const card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = `
      <a href="${video.page}"><img src="${video.thumbnail}" alt="${video.title}"></a>
      <h3>${video.title}</h3>
      <p>${video.description}</p>
    `;
    trending.appendChild(card);
  });
});
</script>

</body>
</html>
