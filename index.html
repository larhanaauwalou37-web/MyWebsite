<title>Website na Auwal - Home</title>
<style>
/* General */
body { font-family: 'Arial', sans-serif; margin:0; padding:0; background:#0d0d0d; color:#fff;}
a { text-decoration:none; color:inherit;}

/* Header */
header { background:#111; padding:20px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.7);}
header h1 { margin:0; font-size:2.5em; color:#ffcc00; text-shadow:2px 2px 8px #000;}

/* Navigation */
nav { background:#222; display:flex; justify-content:center; gap:25px; padding:15px 0; box-shadow:0 2px 5px rgba(0,0,0,0.5);}
nav a { color:#fff; font-weight:bold; transition:0.3s; font-size:1.1em;}
nav a:hover { color:#ffcc00; }

/* Featured carousel */
.featured { display:flex; overflow-x:auto; gap:20px; padding:20px;}
.featured::-webkit-scrollbar { display:none; }
.featured video { border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.7); height:250px; }
.featured h2 { text-align:center; margin:10px 0; color:#ffcc00;}

/* Trending section */
.trending { padding:20px; }
.trending h2 { color:#ffcc00; margin-bottom:15px; }

/* Video grid */
.container { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px; }
.video-card { background:#1a1a1a; border-radius:10px; overflow:hidden; width:300px; transition:0.3s; box-shadow:0 5px 15px rgba(0,0,0,0.5);}
.video-card:hover { transform:scale(1.05); box-shadow:0 10px 20px rgba(0,0,0,0.7);}
.video-card img { width:100%; display:block; }
.video-card h3 { margin:10px; color:#ffcc00; }
.video-card p { margin:0 10px 10px 10px; font-size:0.9em; color:#ccc; }

/* Footer */
footer { background:#111; text-align:center; padding:20px; margin-top:20px; font-size:0.9em; color:#aaa; }

/* Responsive */
@media(max-width:768px) {
  .video-card, .featured video { width:90%; height:auto; }
  nav { flex-direction: column; gap:10px; }
}
</style>
</head>
